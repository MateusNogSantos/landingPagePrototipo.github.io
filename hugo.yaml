baseURL: 'https://tailbliss.netlify.app/'
title: PROGRAMAÇÃO BÁSICA PARA TODOS
languageCode: en-us
DefaultContentLanguage: en
enableEmoji: true
enableGitInfo: false
enableRobotsTXT: true
canonifyURLs: false
pagination:
  pagerSize: 9
darkmode_js:
  - assets/js/darkmode.js
enableInlineShortcodes: true

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      linkifyProtocol: https
      strikethrough: true
      table: true
      taskList: true
      typographer:
        apostrophe: '&rsquo;'
        disable: false
        ellipsis: '&hellip;'
        emDash: '&mdash;'
        enDash: '&ndash;'
        leftAngleQuote: '&laquo;'
        leftDoubleQuote: '&ldquo;'
        leftSingleQuote: '&lsquo;'
        rightAngleQuote: '&raquo;'
        rightDoubleQuote: '&rdquo;'
        rightSingleQuote: '&rsquo;'
    parser:
      attribute:
        block: false
        title: true
      autoHeadingID: true
      autoHeadingIDType: github
      wrapStandAloneImageWithinParagraph: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
  author: Nusser Studios
  authorimage: ../assets/images/global/author.webp
  og_image: /images/tailbliss-cover.png
  moto: "Quem somos?"
  description: "O Programação Básica para Todos é um projeto de extensão da Universidade Federal de Lavras (UFLA), associado ao Departamento de Ciência da Computação (DCC), que tem como objetivo tornar o ensino de programação acessível para estudantes da educação básica e comunidades locais."
  disable_theme_toggle: false
  newsletter_signup: true

  p1:
    heading: "Motivação"
    image: "images/pages/imagemEquipeVinicius2.jpg"
    content:
      - text: "A iniciativa é conduzida por estudantes extensionistas dos cursos de Bacharelado em Ciência da Computação (BCC) e Bacharelado em Sistemas de Informação (BSI), com orientação docente, e já está em fase ativa de desenvolvimento, incluindo levantamento de necessidades pedagógicas e contato com instituições parceiras."
      - text: "Nosso propósito é aproximar crianças, jovens e adultos do universo da lógica, da tecnologia e do pensamento computacional, contribuindo para a inclusão digital e para a formação de competências essenciais no século XXI."
      - text: "Acreditamos que a programação é uma habilidade fundamental para o desenvolvimento pessoal e profissional, e que todos devem ter a oportunidade de aprender e se beneficiar dela. Por isso, estamos comprometidos em criar recursos educacionais acessíveis, envolventes e eficazes, que possam ser utilizados por qualquer pessoa interessada em aprender a programar."
  p2:
    heading: "Programação nas Escolas: Habilidades para o Futuro"
    image: "images/pages/imagemEquipeEAlunos2.jpg"
    content:
      - text: "Oferecer programação nas escolas desenvolve habilidades essenciais como raciocínio lógico, resolução de problemas, pensamento computacional, criatividade, autonomia, planejamento e interpretação de comandos, além de preparar os estudantes para um mercado cada vez mais tecnológico. Para isso, oferecemos oficinas práticas e interativas, com duração de 1 a 4 horas, adaptadas para Ensino Fundamental I e II, Ensino Médio e EJA. As atividades usam plataformas lúdicas como Blockly Games, Code.org, Cargo-Bot, CodeCombat, CheckIO, CodinGame, Elevator Saga e Vim Adventures, permitindo que os estudantes aprendam programação de forma visual, gamificada e acessível, mesmo sem conhecimento prévio."
      - type: "table"
        columns:
          - heading: "Column 1"
            items:
              - "Bullet point 1"
              - "Bullet point 2"
              - "Bullet point 3"
          - heading: "Column 2"
            items:
              - "Bullet point 4"
              - "Bullet point 5"
              - "Bullet point 6"

  p4:
    heading: "From the blog"
    content:
      - text: "Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ipsa libero labore natus atque, ducimus sed."

  social_media:
    github:
      enabled: true
      url: 'https://github.com/nusserstudios'
    facebook:
      enabled: true
      url: 'https://facebook.com/nusserstudios'
    instagram:
      enabled: true
      url: 'https://instagram.com/nusserstudios'
    twitter:
      enabled: true
      url: 'https://twitter.com/nusserstudios'
    

